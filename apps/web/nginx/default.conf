# SPA + API proxy (web container içi)
# Önemli: /assets/*.js için index.html fallback YOK — yoksa dinamik import "Failed to fetch" verir.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_api api:3000;

    location /api/ {
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Vite hash'li chunk'lar — dosya yoksa 404 (index.html dönme)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # PWA / kökte kalan statikler (build çıktısına göre)
    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest|workbox-.*\.js)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
