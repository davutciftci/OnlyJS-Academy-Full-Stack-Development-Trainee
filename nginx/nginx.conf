worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Upstream tanımları
    upstream api_upstream {
        server api:3000;
    }

    upstream web_upstream {
        server web:80;
    }

    server {
        listen 80;
        server_name _;   # Tüm host'ları yakala (domain eklenince buraya yazılır)

        # Güvenlik header'ları
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API istekleri → API container
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeout ayarları
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Swagger UI
        location /api-docs {
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Upload dosyaları
        location /uploads/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check (nginx seviyesinde)
        location /health {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
        }

        # Web uygulaması → Web container
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # React Router için — 404'ü index.html'e yönlendir
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }

    # ─────────────────────────────────────────────────────────
    # HTTPS HAZIRLIĞI: Domain alındığında aşağıdaki bloğu aç
    # ve Certbot sertifikalarının yolunu güncelle.
    # ─────────────────────────────────────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com www.yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # HTTP → HTTPS yönlendirme için üstteki server bloğuna ekle:
    #     # return 301 https://$host$request_uri;
    #
    #     # (api, web, health location blokları buraya da kopyalanır)
    # }
}
