name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install API dependencies
        run: cd apps/api && npm ci

      - name: Run API tests
        run: cd apps/api && npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: davutciftci/onlyjs-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: davutciftci/onlyjs-web:latest
          build-args: |
            VITE_API_URL=/api

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # EC2_HOST: instance’ın public IPv4 veya buna işaret eden DNS olmalı (10.x private IP Actions’tan ulaşılamaz).
      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > key.pem
          chmod 600 key.pem

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: key.pem
          port: 22
          # GitHub runner’dan IPv6 yönlendirmesi sorun çıkarabiliyor; sadece IPv4 kullan.
          protocol: tcp4
          timeout: 120s
          command_timeout: 30m
          script: |
            cd onlyjs-academy && git pull origin main && docker compose pull && WEB_PORT=80 docker compose up -d && docker system prune -f

      - name: Remove SSH key
        if: always()
        run: rm -f key.pem
