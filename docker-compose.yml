services:
  redis:
    image: redis:alpine
    container_name: OnlyJsAcademyFullStackDevelopmentTraineeRedis
    ports:
      - "6379:6379"
  
  postgres:
    image: postgres:15
    container_name: OnlyJsAcademyFullStackDevelopmentTraineePostgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
    env_file:
      - ./apps/api/.env

  web:
    build: ./apps/web
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
