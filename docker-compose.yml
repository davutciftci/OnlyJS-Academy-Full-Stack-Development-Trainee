services:
  redis:
    image: redis:alpine
    container_name: OnlyJsAcademyFullStackDevelopmentTraineeRedis
    ports:
      - "6379:6379"
    networks:
      - onlyjs-academy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: OnlyJsAcademyFullStackDevelopmentTraineePostgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "104039"
      POSTGRES_DB: proteinshopbackend
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onlyjs-academy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Üretim (EC2) amd64; Mac ARM’de çekince uyarı yerine bilinçli emülasyon
    platform: linux/amd64
    image: davutciftci/onlyjs-api:latest
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:104039@postgres:5432/proteinshopbackend
      FRONTEND_URL: ${FRONTEND_URL:-http://13.61.27.22}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    volumes:
      - api_uploads:/app/uploads
    networks:
      - onlyjs-academy

  web:
    platform: linux/amd64
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: davutciftci/onlyjs-web:latest
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - onlyjs-academy

networks:
  onlyjs-academy:
    driver: bridge
    name: onlyjs-academy

volumes:
  postgres_data:
  api_uploads: