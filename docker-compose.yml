services:
  redis:
    image: redis:alpine
    container_name: OnlyJsAcademyFullStackDevelopmentTraineeRedis
    ports:
      - "6379:6379"
    networks:
      - onlyjs-academy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  postgres:
    image: postgres:15
    container_name: OnlyJsAcademyFullStackDevelopmentTraineePostgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "104039"
      POSTGRES_DB: proteinshopbackend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onlyjs-academy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    networks:
      - onlyjs-academy
  

  web:
    build: ./apps/web
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - onlyjs-academy

networks:
  onlyjs-academy:
    driver: bridge
    name: onlyjs-academy
volumes:
  postgres_data:
